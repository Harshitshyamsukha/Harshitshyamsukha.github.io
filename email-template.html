<div style="font-family: 'DM Sans', system-ui, -apple-system, sans-serif; max-width: 560px; margin: 0 auto; background: #0D0D0D; color: #F5F0EB; border-radius: 12px; overflow: hidden; border: 1px solid #2A2A2A;">
  
  <div style="background: #141414; padding: 32px 32px 24px; border-bottom: 1px solid #2A2A2A;">
    <span style="color: #E63946; font-size: 20px; font-weight: 700;">✧</span>
    <span style="color: #5C5550; font-size: 13px; font-family: 'JetBrains Mono', monospace; margin-left: 8px;">new message</span>
    <h1 style="font-family: 'Playfair Display', Georgia, serif; font-weight: 700; font-size: 26px; color: #F5F0EB; margin: 12px 0 0; line-height: 1.2;">
      Someone reached out
    </h1>
  </div>

  <div style="padding: 32px;">
    <table role="presentation" cellpadding="0" cellspacing="0" style="width: 100%; border-collapse: collapse;">
      <tr>
        <td style="width: 48px; vertical-align: top; padding-bottom: 24px;">
          <div style="width: 40px; height: 40px; border-radius: 50%; background: #E63946; color: #fff; display: inline-block; vertical-align: middle; text-align: center; line-height: 40px; font-size: 16px; font-weight: 700;">●</div>
        </td>
        <td style="vertical-align: top; padding-bottom: 24px; border-bottom: 1px dashed #2A2A2A;">
          <div style="font-weight: 600; font-size: 16px; color: #F5F0EB;">{{name}}</div>
          <div style="color: #5C5550; font-size: 12px; font-family: 'JetBrains Mono', monospace; margin-top: 2px;">{{time}}</div>
          <div style="margin-top: 6px;">
            <span style="display: inline-block; padding: 3px 10px; border-radius: 4px; background: rgba(99,102,241,0.15); color: #818CF8; font-size: 11px; font-family: 'JetBrains Mono', monospace; border: 1px solid rgba(99,102,241,0.3);">{{subject}}</span>
          </div>
        </td>
      </tr>
    </table>

    <div style="margin: 24px 0;">
      <div style="color: #5C5550; font-size: 11px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;">message</div>
      <div style="color: #F5F0EB; font-size: 15px; line-height: 1.7; white-space: pre-wrap;">{{message}}</div>
    </div>

    <table role="presentation" cellpadding="0" cellspacing="0" style="width: 100%; border-collapse: collapse;">
      <tr>
        <td style="padding: 0;">
          <a href="mailto:{{email}}" style="display: inline-block; padding: 12px 28px; background: #E63946; color: #ffffff; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 14px;">Reply to {{name}}</a>
        </td>
      </tr>
    </table>
  </div>

  <div style="padding: 16px 32px; background: #141414; border-top: 1px solid #2A2A2A; text-align: center;">
    <span style="color: #5C5550; font-size: 11px; font-family: 'JetBrains Mono', monospace;">harshitshyamsukha.github.io</span>
  </div>

</div>
