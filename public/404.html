<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Harshit Shyamsukha</title>
  <style>
    :root {
      --navy: #0A0F1E; --teal: #1D9E75; --teal-2: #15C48A;
      --text: #E8EDF5; --text-muted: #7A8BA8;
      --border: rgba(255,255,255,0.07); --border-2: rgba(29,158,117,0.3);
      --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif; --font-mono: 'JetBrains Mono', monospace;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body); background: var(--navy); color: var(--text);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; padding: 2rem;
    }
    h1 { font-family: var(--font-display); font-size: clamp(4rem, 10vw, 8rem); color: var(--teal); line-height: 1; margin-bottom: 1rem; }
    p { font-size: 1.1rem; color: var(--text-muted); max-width: 400px; margin-bottom: 2rem; line-height: 1.6; }
    .links { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    a {
      font-family: var(--font-mono); font-size: 0.85rem; color: var(--teal-2);
      text-decoration: none; padding: 10px 24px; border: 1px solid var(--border-2);
      border-radius: var(--radius); transition: all 0.25s ease;
    }
    a:hover { background: rgba(29,158,117,0.15); border-color: var(--teal); transform: translateY(-2px); }
    .cursor-blink { display: inline-block; width: 8px; height: 14px; background: var(--teal-2); vertical-align: middle; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <h1>404</h1>
  <p>This page doesn't exist — but I do.<br/><span style="color: var(--text-muted); font-size: 0.9rem;">Let's get you somewhere useful.</span></p>
  <div class="links">
    <a href="/">~/home</a>
    <a href="/#projects">~/projects</a>
    <a href="mailto:harshitshyamsukha@gmail.com">~/contact</a>
  </div>
  <p style="margin-top: 3rem; font-family: var(--font-mono); font-size: 0.75rem;">
    <span style="color: var(--text-muted);">$</span> <span style="color: var(--text);">cd /home</span> <span class="cursor-blink"></span>
  </p>
</body>
</html>
