    <style>
      :root {
        /* Chromatic Alabaster – Light High-Contrast */
        --c-canvas: #f9f9f9;
        --c-surface: #f9f9f9;
        --c-surface-2: #f3f3f3;
        --c-surface-3: #eeeeee;
        --c-elevation: #ffffff;
        --c-primary:       #000000;
        --c-primary-container: #1b1b1b;
        --c-on-primary-container: #848484;
        --c-accent:        #000000;
        --c-accent-dim:    rgba(0, 0, 0, 0.06);
        --c-accent-text:   #000000;
        --c-secondary:         #a900a9;
        --c-secondary-dim:     rgba(169, 0, 169, 0.10);
        --c-secondary-text:    #a900a9;
        --c-tertiary:          #000000;
        --c-tertiary-dim:      rgba(0, 0, 0, 0.06);
        --c-border: #000000;
        --c-border-hover: #000000;
        --c-text-1: #1b1b1b;
        --c-text-2: #4c4546;
        --c-text-3: #7e7576;
        --c-green: #00ff00;
        --c-amber: #ffff00;
        --c-blue-link: #0000ff;

        /* Chromatic Palette */
        --chroma-1: #ff00ff;
        --chroma-2: #00ffff;
        --chroma-3: #ffff00;
        --chroma-4: #00ff00;
        --chroma-5: #ff0000;
        --chroma-6: #0000ff;

        --font-display: 'Sora', sans-serif;
        --font-body:    'Hanken Grotesk', sans-serif;
        --font-mono:    'JetBrains Mono', monospace;
        --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px; --sp-5: 20px;
        --sp-6: 24px; --sp-8: 32px; --sp-10: 40px; --sp-12: 48px; --sp-16: 64px;
        --r-sm: 0px; --r-md: 0px; --r-lg: 0px; --r-xl: 0px; --r-full: 9999px;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        font-family: var(--font-body); font-weight: 400; font-size: 16px;
        line-height: 1.6; background: var(--c-canvas); color: var(--c-text-1);
        overflow-x: hidden; -webkit-font-smoothing: antialiased;
      }
      a { color: inherit; text-decoration: none; }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: var(--c-canvas); }
      ::-webkit-scrollbar-thumb { background: #000000; }

      .layout { min-height: 100vh; position: relative; animation: bgShift 30s ease-in-out infinite; }
      .chromatic-shadow { box-shadow: 4px 4px 0px 0px #000000; }
      .chromatic-border {
        border: 2px solid transparent;
        background-image: linear-gradient(#fff, #fff), linear-gradient(90deg, #ff00ff, #00ffff, #ffff00, #ff00ff);
        background-origin: border-box;
        background-clip: padding-box, border-box;
      }

      /* ===== SECTION HEADERS ===== */
      .section-title {
        font-family: var(--font-display); font-weight: 700; font-size: 40px;
        color: #000000; letter-spacing: -0.02em;
        display: flex; align-items: center; gap: var(--sp-4);
        margin-bottom: var(--sp-12);
      }
      .section-title .bar { width: var(--sp-12); height: 4px; display: inline-block; }
      .section-title .bar.magenta { background: var(--chroma-1); }
      .section-title .bar.cyan { background: var(--chroma-2); }
      .section-title .bar.yellow { background: var(--chroma-3); }
      .section-title .bar.green { background: var(--chroma-4); }

      /* ===== TAB BAR ===== */
      .tab-bar {
        display: flex; gap: var(--sp-2); flex-wrap: wrap; justify-content: center;
        padding: var(--sp-2) 0; margin-bottom: var(--sp-8);
      }
      .tab-btn {
        padding: 6px 14px; border: 2px solid #000000;
        background: transparent; color: #000000;
        font-family: var(--font-mono); font-weight: 500;
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
        cursor: pointer; transition: all 120ms ease; white-space: nowrap;
      }
      .tab-btn:hover { background: var(--c-secondary-dim); color: var(--c-secondary); border-color: var(--c-secondary); }
      .tab-btn.active { background: #000000; color: #ffffff; border-color: #000000; }

      /* ===== MAIN ===== */
      .main { padding: 0 var(--sp-8) var(--sp-16); max-width: 1280px; margin: 0 auto; width: 100%; position: relative; z-index: 1; }

      /* ===== ABOUT SECTION ===== */
      .about-hero {
        display: grid; grid-template-columns: 140px 1fr; gap: var(--sp-6);
        padding: var(--sp-10) 0 var(--sp-6); align-items: start;
        width: min(75vw, 1280px); margin: 0 auto;
      }
      .about-avatar {
        width: 140px; height: 180px;
        border: 2px solid #000000; background: var(--c-canvas); color: #000000;
        display: flex; align-items: center; justify-content: center;
        font-family: var(--font-display); font-weight: 600; font-size: 42px;
        box-shadow: 4px 4px 0px 0px #000000;
        animation: float 3s ease-in-out infinite;
      }
      .about-hero-right { display: flex; flex-direction: column; gap: var(--sp-2); padding-top: var(--sp-2); }
      .about-name { font-family: var(--font-display); font-weight: 700; font-size: 26px; color: #000000; line-height: 1.2; }
      .about-role { font-size: 13px; color: var(--c-text-2); line-height: 1.5; }
      .about-role::after {
        content: '|'; margin-left: 2px;
        animation: blink 1s step-end infinite;
        color: var(--c-text-2);
      }
      .about-tags { font-family: var(--font-mono); font-size: 11px; color: var(--c-text-3); }
      .about-social { display: flex; gap: var(--sp-2); margin-top: var(--sp-1); }
      .about-social a {
        display: flex; align-items: center; justify-content: center;
        width: 36px; height: 36px;
        background: #ffffff; border: 2px solid #000000; color: #000000;
        transition: all 150ms ease; box-shadow: 2px 2px 0px 0px #000000;
      }
      .about-social a:hover { background: #000000; color: #ffffff; box-shadow: none; transform: translate(2px, 2px); }
      .about-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--sp-4); padding-bottom: var(--sp-8); width: min(75vw, 1280px); margin: 0 auto; }
      .about-card { cursor: pointer; transition: all 150ms ease; }
      @media (max-width: 900px) { .about-cards { grid-template-columns: repeat(2, 1fr); } }
      @media (max-width: 700px) { .about-hero { grid-template-columns: 1fr; justify-items: center; text-align: center; } .about-hero-right { align-items: center; } .about-avatar { width: 100px; height: 130px; font-size: 30px; } }
      @media (max-width: 600px) { .about-cards { grid-template-columns: 1fr; } }
      .about-card {
        background: #ffffff; border: 2px solid #000000;
        padding: var(--sp-5); display: flex; flex-direction: column; gap: var(--sp-3);
        box-shadow: 3px 3px 0px 0px #000000; position: relative;
        transition: all 150ms ease;
      }
      .about-card::before {
        content: ''; position: absolute; top: -2px; left: -2px; width: calc(100% + 4px); height: 4px;
        background: linear-gradient(90deg, #b300b3, #00b3b3, #b3b300, #b300b3);
        background-size: 200% 100%;
        animation: chromaShift 4s linear infinite;
        pointer-events: none; z-index: 1;
      }
      .about-card:hover {
        background: #000000;
        box-shadow: 4px 4px 0px 0px #b300b3, 8px 8px 0px 0px #00b3b3, 12px 12px 0px 0px #b3b300;
        transform: translate(-3px, -3px);
      }
      .about-card:hover .about-card-title,
      .about-card:hover .about-card-row,
      .about-card:hover .about-card-row strong,
      .about-card:hover .about-card-mono,
      .about-card:hover .about-card-icon { color: #ffffff !important; border-color: #ffffff; }
      .about-card:hover .about-card-icon { background: transparent; }
      .about-card:hover .about-card-row { color: #cccccc !important; }
      .about-card:hover .about-card-tag { color: #ffffff; border-color: #ffffff; background: transparent; }
      .about-card:hover .about-card-tag:hover { background: var(--c-secondary-dim); color: var(--c-secondary); border-color: var(--c-secondary); }
      .about-card-hdr { display: flex; align-items: center; gap: var(--sp-3); }
      .about-card-icon {
        width: 36px; height: 36px;
        background: var(--c-canvas); border: 2px solid #000000;
        display: flex; align-items: center; justify-content: center;
        color: #000000; flex-shrink: 0; transition: all 150ms ease;
      }
      .about-card-title { font-family: var(--font-display); font-weight: 600; font-size: 15px; color: #000000; transition: all 150ms ease; }
      .about-card-body { display: flex; flex-direction: column; gap: var(--sp-2); }
      .about-card-row { font-size: 13px; color: var(--c-text-2); line-height: 1.6; transition: all 150ms ease; }
      .about-card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
      .about-card-tag {
        font-family: var(--font-mono); font-weight: 500; font-size: 10px; text-transform: uppercase;
        padding: 2px 7px; border: 2px solid #000000;
        background: var(--c-canvas); color: #000000; transition: all 150ms ease;
      }
      .about-card-mono { font-family: var(--font-mono); font-size: 12px; color: var(--c-text-2); line-height: 1.6; transition: all 150ms ease; }

      /* ===== MASONRY ===== */
      .masonry { columns: 2; column-gap: var(--sp-6); }
      @media (min-width: 1024px) { .masonry { columns: 3; column-gap: var(--sp-6); } }
      @media (min-width: 1440px) { .masonry { columns: 5; column-gap: var(--sp-6); } }
      @media (max-width: 768px) { .masonry { columns: 1; } }

      /* ===== PIN CARD ===== */
      .pin-card {
        break-inside: avoid; margin-bottom: var(--sp-6);
        background: #ffffff; border: 2px solid #000000;
        box-shadow: 4px 4px 0px 0px #000000;
        cursor: pointer; transition: all 250ms ease;
        display: flex; flex-direction: column; align-items: center; text-align: center;
        padding: var(--sp-6); gap: var(--sp-2);
        position: relative;
      }
      .pin-card::before {
        content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
        background: linear-gradient(90deg, #b300b3, #00b3b3, #b3b300, #b300b3);
        background-size: 200% 100%;
        animation: chromaShift 4s linear infinite;
        pointer-events: none; z-index: 1;
      }
      .pin-card:hover {
        transform: translate(-3px, -3px);
        background: #000000;
        box-shadow: 5px 5px 0px 0px #b300b3, 10px 10px 0px 0px #00b3b3, 15px 15px 0px 0px #b3b300;
      }
      .pin-card:hover .pin-title,
      .pin-card:hover .pin-desc,
      .pin-card:hover .pin-meta,
      .pin-card:hover .pin-icon { color: #ffffff; border-color: #ffffff; }
      .pin-card:hover .pin-icon { background: transparent; }
      .pin-card:hover .pin-desc { color: #cccccc; }
      .pin-card:hover .pin-status { border-color: #ffffff; }
      .pin-card:hover .pin-category { background: transparent !important; color: #ffffff !important; border-color: #ffffff; }
      .pin-card:hover .pin-tag {
        background: transparent; color: #ffffff; border-color: #ffffff;
      }
      .pin-icon {
        width: 44px; height: 44px; border: 2px solid #000000;
        background: var(--c-canvas); display: flex;
        align-items: center; justify-content: center;
        color: #000000; flex-shrink: 0; transition: all 250ms ease;
      }
      .pin-icon svg { width: 20px; height: 20px; }
      .pin-title { font-family: var(--font-display); font-weight: 700; font-size: 16px; color: #000000; line-height: 1.3; transition: all 250ms ease; }
      .pin-desc { font-size: 14px; color: var(--c-text-2); line-height: 1.5; margin-top: var(--sp-1); transition: all 250ms ease; }
      .pin-meta { display: flex; align-items: center; gap: var(--sp-2); margin-top: auto; padding-top: var(--sp-3); transition: all 250ms ease; }
      .pin-category {
        font-family: var(--font-mono); font-weight: 500; font-size: 10px; text-transform: uppercase;
        letter-spacing: 0.08em; padding: 3px 8px; border: 2px solid #000000;
      }
      .pin-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; border: 1px solid #000000; }
      .pin-status.live { background: var(--c-green); }
      .pin-status.wip { background: var(--c-amber); }

      .pin-stack { display: flex; flex-wrap: wrap; gap: var(--sp-1); }
      .pin-tag {
        font-family: var(--font-mono); font-weight: 500; font-size: 10px; text-transform: uppercase;
        padding: 3px 8px; border: 2px solid #000000;
        background: var(--c-canvas); color: #000000;
        transition: all 120ms ease;
      }
      .pin-tag:hover { background: var(--c-secondary-dim); color: var(--c-secondary); border-color: var(--c-secondary); }

      .chroma-hdr { width: 100%; height: 4px; flex-shrink: 0; }

      /* ===== SECTION TITLE ===== */
      .section-title {
        font-family: var(--font-display); font-weight: 700; font-size: 40px;
        color: #000000; letter-spacing: -0.02em;
        margin-bottom: var(--sp-6);
      }
      .section-title.is-visible { clip-path: inset(0 0% 0 0); }
      .typewriter-cursor { animation: blink 1s step-end infinite; }

      /* ===== REVEAL ===== */
      .reveal { opacity: 0; transform: translateY(16px); transition: opacity 350ms ease-out, transform 350ms ease-out; transition-delay: calc(var(--card-index, 0) * 60ms); }
      .reveal.is-visible { opacity: 1; transform: translateY(0); }

      /* ===== REDUCED MOTION ===== */
      @media (prefers-reduced-motion: reduce) {
        .reveal, .reveal.is-visible, * { transition-duration: 0ms !important; transition-delay: 0ms !important; animation-duration: 0ms !important; }
      }

      /* ===== CONTACT ===== */
      .contact-section { margin-top: var(--sp-12); padding-top: var(--sp-8); }
      .contact-tabs { display: flex; gap: 0; margin-bottom: var(--sp-6); justify-content: center; border-bottom: 2px solid #000000; }
      .contact-tab {
        font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
        padding: 10px 24px; cursor: pointer; background: #ffffff; color: #000000;
        border: 2px solid #000000; border-bottom: none; margin-bottom: -2px;
        transition: all 150ms ease; box-shadow: none;
      }
      .contact-tab.active { background: #000000; color: #ffffff; }
      .contact-tab:first-child { border-right: none; }
      .contact-wrap { max-width: 540px; margin: 0 auto; }
      .contact-form { display: flex; flex-direction: column; gap: var(--sp-4); }
      .form-field { display: flex; flex-direction: column; gap: var(--sp-1); }
      .form-field label { font-family: var(--font-mono); font-size: 11px; color: #000000; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; }
      .form-field input, .form-field select, .form-field textarea {
        background: #ffffff; border: 2px solid #000000;
        font-family: var(--font-body); font-weight: 400; font-size: 16px;
        color: #000000; padding: 10px 14px; outline: none;
        transition: all 200ms ease;
        box-shadow: 2px 2px 0px 0px #000000;
      }
      .form-field input:focus, .form-field select:focus, .form-field textarea:focus {
        border-color: var(--c-secondary);
        box-shadow: 4px 4px 0px 0px var(--c-secondary);
      }
      .form-field input::placeholder, .form-field textarea::placeholder { color: var(--c-text-3); }
      .form-field textarea { min-height: 110px; resize: vertical; }
      .form-error { color: var(--c-secondary); font-size: 14px; font-family: var(--font-mono); }
      .form-success { text-align: center; padding: var(--sp-8) 0; }
      .form-success p:first-child { font-weight: 700; font-size: 20px; color: #000000; margin-bottom: var(--sp-2); }
      .form-success p:last-child { font-size: 14px; color: var(--c-text-2); }

      /* ===== THINKING PROCESS ===== */
      .process-section { margin-top: var(--sp-12); padding-top: var(--sp-8); }
      .process-nav { display: flex; flex-wrap: wrap; gap: var(--sp-2); margin-bottom: var(--sp-6); justify-content: center; }
      .process-nav-btn {
        font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
        padding: 8px 16px; cursor: pointer; background: #ffffff; color: #000000;
        border: 2px solid #000000; transition: all 150ms ease;
      }
      .process-nav-btn.active { background: #000000; color: #ffffff; }
      .process-nav-btn:hover { background: #000000; color: #ffffff; }
      .process-content { max-width: 680px; margin: 0 auto; }
      .process-title { font-family: var(--font-display); font-weight: 700; font-size: 24px; color: #000000; margin-bottom: var(--sp-1); }
      .process-repo-link { font-family: var(--font-mono); font-size: 11px; color: var(--c-secondary); display: inline-block; margin-bottom: var(--sp-4); }
      .process-repo-link:hover { text-decoration: underline; }
      .process-block { margin-bottom: var(--sp-4); }
      .process-block-title { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #000000; margin-bottom: var(--sp-2); padding-bottom: var(--sp-1); border-bottom: 2px solid #000000; }
      .process-text { font-size: 14px; line-height: 1.7; color: var(--c-text-2); }
      .process-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: var(--sp-2); }
      .process-list-item { font-size: 14px; line-height: 1.6; color: var(--c-text-2); padding-left: var(--sp-3); position: relative; }
      .process-list-item::before { content: '→'; position: absolute; left: 0; color: var(--c-secondary); }
      .process-tags { display: flex; flex-wrap: wrap; gap: var(--sp-2); }
      .process-tag {
        font-family: var(--font-mono); font-size: 10px; padding: 4px 10px;
        background: #ffffff; color: var(--c-text-2); border: 1px solid #000000;
      }

      .btn-primary {
        padding: 12px 24px;
        background: #000000; color: #ffffff;
        font-family: var(--font-mono); font-weight: 500; font-size: 11px;
        text-transform: uppercase; letter-spacing: 0.10em;
        border: 2px solid #000000; cursor: pointer;
        box-shadow: 3px 3px 0px 0px #000000;
        transition: all 150ms ease;
      }
      .btn-primary:hover { box-shadow: none; transform: translate(3px, 3px); }
      .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

      /* ===== MODAL OVERLAY ===== */
      .modal-overlay {
        position: fixed; inset: 0; z-index: 200;
        background: rgba(0, 0, 0, 0.70);
        display: flex; align-items: center; justify-content: center;
        gap: var(--sp-3); padding: var(--sp-6); animation: fadeIn 200ms ease;
      }
      .modal-shell {
        background: #ffffff; border: 2px solid #000000;
        box-shadow: 8px 8px 0px 0px #000000;
        max-width: 1100px; width: 100%;
        max-height: min(680px, calc(100vh - 48px)); overflow: clip;
        display: grid; grid-template-columns: 52% 48%; grid-template-rows: minmax(0, 1fr); position: relative;
        transform: scale(0.96); opacity: 0;
        animation: modalIn 200ms ease-out forwards;
      }
      .modal-nav-btn {
        background: #ffffff; border: 2px solid #000000;
        color: #000000; width: 40px; height: 40px;
        cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center;
        transition: all 150ms ease; flex-shrink: 0;
        box-shadow: 2px 2px 0px 0px #000000;
      }
      .modal-nav-btn:hover { box-shadow: none; transform: translate(2px, 2px); }
      .modal-close {
        position: absolute; top: var(--sp-4); right: var(--sp-4); z-index: 10;
        width: 32px; height: 32px;
        background: #ffffff; border: 2px solid #000000;
        color: #000000; cursor: pointer; font-size: 14px;
