    <style>
      :root {
        --c-canvas: #000000;
        --c-surface: #161618;
        --c-surface-2: #1E1E21;
        --c-surface-3: #26262A;
        --c-border: #2E2E33;
        --c-border-hover: #45454C;
        --c-accent: #E63946;
        --c-accent-dim: #7A1A20;
        --c-accent-text: #FF6B75;
        --c-text-1: #FFFFFF;
        --c-text-2: #C8C8D0;
        --c-text-3: #909098;
        --c-green: #28CA41;
        --c-amber: #FFBD2E;
        --c-blue-link: #4A9EFF;
        --font-display: 'Space Grotesk', sans-serif;
        --font-body: 'Inter', sans-serif;
        --font-mono: 'JetBrains Mono', monospace;
        --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px; --sp-5: 20px;
        --sp-6: 24px; --sp-8: 32px; --sp-10: 40px; --sp-12: 48px; --sp-16: 64px;
        --r-sm: 6px; --r-md: 12px; --r-lg: 16px; --r-xl: 24px; --r-full: 9999px;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        font-family: var(--font-body); font-weight: 400; font-size: 14px;
        line-height: 1.6; background: var(--c-canvas); color: var(--c-text-1);
        overflow-x: hidden; -webkit-font-smoothing: antialiased;
      }
      a { color: inherit; text-decoration: none; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--c-canvas); }
      ::-webkit-scrollbar-thumb { background: var(--c-text-3); border-radius: 3px; }

      .layout { min-height: 100vh; }

      /* ===== MAIN ===== */
      .main { padding: 0 var(--sp-8) var(--sp-16); max-width: 1200px; margin: 0 auto; width: 100%; }

      /* ===== ABOUT SECTION ===== */
      .about-hero { display: flex; flex-direction: column; align-items: center; padding: var(--sp-10) 0 var(--sp-6); gap: var(--sp-3); width: min(75vw, 1200px); margin: 0 auto; }
      .about-avatar {
        width: 80px; height: 80px; border-radius: var(--r-full);
        border: 2px solid var(--c-border-hover);
        background: var(--c-accent-dim); color: var(--c-text-1);
        display: flex; align-items: center; justify-content: center;
        font-family: var(--font-display); font-weight: 600; font-size: 24px;
      }
      .about-name { display: flex; flex-direction: column; align-items: center; line-height: 1.2; }
      .about-first { font-family: var(--font-display); font-weight: 600; font-size: 22px; color: var(--c-text-1); }
      .about-last { font-family: var(--font-display); font-weight: 600; font-size: 22px; color: var(--c-text-2); }
      .about-role { font-size: 12px; color: var(--c-text-2); text-align: center; }
      .about-tags { font-family: var(--font-mono); font-size: 11px; color: var(--c-text-3); text-align: center; }
      .about-social { display: flex; gap: var(--sp-2); }
      .about-social a {
        display: flex; align-items: center; justify-content: center;
        width: 36px; height: 36px; border-radius: var(--r-full);
        background: var(--c-surface-2); border: 1px solid var(--c-border);
        color: var(--c-text-2); transition: all 150ms ease;
      }
      .about-social a:hover { color: var(--c-text-1); border-color: var(--c-border-hover); background: var(--c-surface-3); }
      .about-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--sp-4); padding-bottom: var(--sp-8); width: min(75vw, 1200px); margin: 0 auto; }
      .about-card { cursor: pointer; transition: all 150ms ease; }
      .about-card:hover { border-color: var(--c-border-hover); background: var(--c-surface-2); }
      @media (max-width: 900px) { .about-cards { grid-template-columns: repeat(2, 1fr); } }
      @media (max-width: 600px) { .about-cards { grid-template-columns: 1fr; } }
      .about-card {
        background: var(--c-surface); border: 1px solid var(--c-border);
        border-radius: var(--r-md); padding: var(--sp-5); display: flex; flex-direction: column; gap: var(--sp-3);
      }
      .about-card-hdr { display: flex; align-items: center; gap: var(--sp-3); }
      .about-card-icon {
        width: 36px; height: 36px; border-radius: var(--r-sm);
        background: var(--c-accent-dim); display: flex; align-items: center; justify-content: center;
        color: var(--c-accent-text); flex-shrink: 0;
      }
      .about-card-title { font-family: var(--font-display); font-weight: 600; font-size: 15px; color: var(--c-text-1); }
      .about-card-body { display: flex; flex-direction: column; gap: var(--sp-2); }
      .about-card-row { font-size: 13px; color: var(--c-text-2); line-height: 1.6; }
      .about-card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
      .about-card-tag {
        font-family: var(--font-mono); font-size: 10px; padding: 2px 7px;
        border-radius: var(--r-sm); background: #FFFFFF; color: #000000;
        border: 1px solid #E0E0E0;
      }
      .about-card-mono { font-family: var(--font-mono); font-size: 12px; color: var(--c-text-2); line-height: 1.6; }

      /* ===== TAB BAR ===== */
      .tab-bar {
        display: flex; gap: var(--sp-2); flex-wrap: wrap;
        border-bottom: 1px solid var(--c-border);
        padding-bottom: var(--sp-4); padding-top: var(--sp-4);
        position: sticky; top: 0; background: var(--c-canvas); z-index: 10;
      }
      .tab-btn {
        padding: 6px 14px; border-radius: var(--r-sm);
        border: none; background: transparent;
        color: var(--c-text-3); font-family: var(--font-body); font-weight: 500;
        font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em;
        cursor: pointer; transition: all 150ms ease; white-space: nowrap;
      }
      .tab-btn:hover { color: var(--c-text-2); background: var(--c-surface-2); }
      .tab-btn.active { color: var(--c-text-1); background: none; border-bottom: 2px solid var(--c-accent); border-radius: 0; }

      /* ===== MASONRY ===== */
      .masonry { columns: 3; column-gap: var(--sp-4); }
      @media (max-width: 1200px) { .masonry { columns: 2; } }
      @media (max-width: 900px) { .masonry { columns: 1; } }

      /* ===== PIN CARD ===== */
      .pin-card {
        break-inside: avoid; margin-bottom: var(--sp-4);
        background: var(--c-surface); border: 1px solid var(--c-border);
        border-radius: var(--r-md); overflow: hidden; cursor: pointer;
        transition: transform 180ms ease, border-color 180ms ease;
      }
      .pin-card:hover { transform: translateY(-3px); border-color: var(--c-border-hover); }
      .pin-card:hover .card-visual { filter: brightness(1.06); }
      .card-visual { position: relative; overflow: hidden; transition: filter 180ms ease; }
      .pin-body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: var(--sp-2); }
      .pin-top-row { display: flex; align-items: center; justify-content: space-between; }
      .pin-category {
        font-family: var(--font-body); font-weight: 500; font-size: 10px; text-transform: uppercase;
        letter-spacing: 0.06em; color: var(--c-accent-text);
        background: var(--c-accent-dim); padding: 3px 8px; border-radius: var(--r-sm);
      }
      .pin-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
      .pin-status.live { background: var(--c-green); }
      .pin-status.wip { background: var(--c-amber); }
      .pin-title { font-family: var(--font-display); font-weight: 600; font-size: 16px; color: var(--c-text-1); line-height: 1.25; margin-top: 8px; }
      .pin-desc { font-size: 12px; color: var(--c-text-2); line-height: 1.5; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .pin-stack { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
      .pin-tag {
        font-family: var(--font-mono); font-size: 10px; padding: 2px 7px;
        border-radius: var(--r-sm); background: #FFFFFF; color: #000000;
        border: 1px solid #E0E0E0;
      }
      .pin-date { font-family: var(--font-mono); font-size: 10px; color: var(--c-text-3); margin-top: 10px; align-self: flex-end; }

      /* ===== SECTION TITLE ===== */
      .section-title {
        font-family: var(--font-display); font-weight: 600; font-size: 24px;
        color: var(--c-text-1); margin-bottom: var(--sp-6);
        clip-path: inset(0 100% 0 0); transition: clip-path 700ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      .section-title.is-visible { clip-path: inset(0 0% 0 0); }

      /* ===== REVEAL ===== */
      .reveal { opacity: 0; transform: translateY(16px); transition: opacity 350ms ease-out, transform 350ms ease-out; transition-delay: calc(var(--card-index, 0) * 60ms); }
      .reveal.is-visible { opacity: 1; transform: translateY(0); }

      /* ===== REDUCED MOTION ===== */
      @media (prefers-reduced-motion: reduce) {
        .reveal, .reveal.is-visible, * { transition-duration: 0ms !important; transition-delay: 0ms !important; animation-duration: 0ms !important; }
      }

      /* ===== CONTACT ===== */
      .contact-section { margin-top: var(--sp-12); padding-top: var(--sp-8); }
      .contact-wrap { max-width: 540px; margin: 0 auto; }
      .contact-form { display: flex; flex-direction: column; gap: var(--sp-4); }
      .form-field { display: flex; flex-direction: column; gap: var(--sp-1); }
      .form-field label { font-family: var(--font-mono); font-size: 11px; color: var(--c-text-2); }
      .form-field input, .form-field select, .form-field textarea {
        background: var(--c-surface-2); border: 1px solid var(--c-border);
        border-radius: var(--r-md); font-family: var(--font-body);
        font-weight: 400; font-size: 14px; color: var(--c-text-1);
        padding: 10px 14px; outline: none;
        transition: border-color 200ms ease;
      }
      .form-field input:focus, .form-field select:focus, .form-field textarea:focus {
        border-color: var(--c-accent);
      }
      .form-field input::placeholder, .form-field textarea::placeholder { color: var(--c-text-3); }
      .form-field textarea { min-height: 110px; resize: vertical; }
      .form-error { color: var(--c-accent); font-size: 13px; font-family: var(--font-body); }
      .form-success { text-align: center; padding: var(--sp-8) 0; }
      .form-success p:first-child { font-weight: 600; font-size: 18px; color: var(--c-text-1); margin-bottom: var(--sp-2); }
      .form-success p:last-child { font-size: 13px; color: var(--c-text-2); }


      .btn-primary {
        padding: 12px 24px; border-radius: var(--r-full);
        background: var(--c-accent); color: var(--c-text-1);
        font-family: var(--font-body); font-weight: 600; font-size: 12px;
        letter-spacing: 0.03em; border: none; cursor: pointer;
        display: inline-flex; align-items: center; gap: var(--sp-2);
        transition: background 200ms ease, transform 150ms ease;
      }
      .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(230, 57, 70, 0.25); }
      .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

      /* ===== MODAL OVERLAY ===== */
      .modal-overlay {
        position: fixed; inset: 0; z-index: 200;
        background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(4px);
        display: flex; align-items: center; justify-content: center;
        gap: var(--sp-3); padding: var(--sp-6); animation: fadeIn 200ms ease;
      }
      .modal-shell {
        background: var(--c-surface-2); border: 1px solid var(--c-border-hover);
        border-radius: var(--r-xl); max-width: 1100px; width: 100%;
        max-height: min(680px, calc(100vh - 48px)); overflow: clip;
        display: grid; grid-template-columns: 52% 48%; grid-template-rows: minmax(0, 1fr); position: relative;
        transform: scale(0.96); opacity: 0;
        animation: modalIn 200ms ease-out forwards;
      }
      .modal-nav-btn {
        background: var(--c-surface-3); border: 1px solid var(--c-border);
        color: var(--c-text-1); width: 40px; height: 40px; border-radius: var(--r-full);
        cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center;
        transition: all 150ms ease; flex-shrink: 0;
      }
      .modal-nav-btn:hover { background: var(--c-surface-3); border-color: var(--c-border-hover); }
      .modal-close {
        position: absolute; top: var(--sp-4); right: var(--sp-4); z-index: 10;
        width: 32px; height: 32px; border-radius: var(--r-full);
        background: var(--c-surface-3); border: 1px solid var(--c-border);
        color: var(--c-text-2); cursor: pointer; font-size: 14px;
        display: flex; align-items: center; justify-content: center;
        transition: all 150ms ease;
      }
      .modal-close:hover { color: var(--c-text-1); border-color: var(--c-border-hover); }
      .modal-left {
        background: var(--c-surface); border-right: 1px solid var(--c-border);
        padding: 40px 36px; display: flex; flex-direction: column; gap: var(--sp-4);
        overflow-y: auto; min-height: 0;
      }
      .modal-right {
        padding: 28px; display: flex; flex-direction: column; gap: var(--sp-6);
        overflow-y: auto; min-height: 0;
      }
      .modal-top-row { display: flex; align-items: center; gap: var(--sp-2); }
      .modal-title { font-family: var(--font-display); font-weight: 600; font-size: 22px; color: var(--c-text-1); line-height: 1.2; margin-bottom: 8px; }
      .modal-date { font-family: var(--font-mono); font-size: 11px; color: var(--c-text-3); display: block; }
      .modal-divider { height: 1px; background: var(--c-border); margin: var(--sp-5) 0; }
      .modal-caption { font-size: 14px; color: var(--c-text-2); line-height: 1.7; margin-bottom: var(--sp-5); }
      .modal-problem { border-left: 2px solid var(--c-accent); padding-left: 12px; background: var(--c-surface-3); border-radius: 0 var(--r-sm) var(--r-sm) 0; padding: 10px 14px 10px 14px; }
      .modal-problem-label { font-family: var(--font-body); font-weight: 500; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--c-text-3); display: block; margin-bottom: 6px; }
      .modal-problem p { font-size: 13px; color: var(--c-text-2); line-height: 1.65; }
      .modal-metrics { background: var(--c-surface-3); border: 1px solid var(--c-accent-dim); border-radius: var(--r-md); padding: 14px 16px; display: flex; flex-direction: column; gap: 4px; margin-top: var(--sp-4); }
      .modal-metrics-label { font-family: var(--font-body); font-weight: 500; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--c-accent-text); }
      .modal-metrics-value { font-family: var(--font-display); font-weight: 600; font-size: 16px; color: var(--c-text-1); }
      .modal-links-row { display: flex; gap: var(--sp-3); flex-wrap: wrap; margin-top: auto; padding-top: var(--sp-4); }
      .modal-link-btn {
        padding: 8px 16px; border-radius: var(--r-md);
        border: 1px solid var(--c-border-hover); color: var(--c-text-1);
        font-family: var(--font-body); font-weight: 500; font-size: 13px; cursor: pointer;
        transition: all 150ms ease; text-decoration: none;
      }
      .modal-link-btn:hover { border-color: var(--c-accent); color: var(--c-accent-text); }

      /* ===== COMMENT BLOCKS ===== */
      .comment-block { background: var(--c-surface-3); border: 1px solid var(--c-border); border-radius: var(--r-md); padding: 14px 16px; }
      .comment-header { display: flex; align-items: center; gap: var(--sp-2); margin-bottom: var(--sp-3); }
      .comment-icon { width: 24px; height: 24px; border-radius: var(--r-full); background: var(--c-surface); border: 1px solid var(--c-border); display: flex; align-items: center; justify-content: center; color: var(--c-text-3); flex-shrink: 0; }
      .comment-label { font-family: var(--font-body); font-weight: 500; font-size: 11px; color: var(--c-text-3); text-transform: uppercase; letter-spacing: 0.08em; }
      .comment-divider { height: 1px; background: var(--c-border); margin-bottom: var(--sp-3); }
      .comment-list { display: flex; flex-direction: column; }
      .comment-item { display: flex; gap: var(--sp-3); align-items: flex-start; padding: 6px 0; border-bottom: 1px solid var(--c-border); }
      .comment-item:last-child { border-bottom: none; }
      .comment-num { font-family: var(--font-mono); font-size: 13px; color: var(--c-accent-text); flex-shrink: 0; min-width: 24px; }
      .comment-text { font-size: 13px; color: var(--c-text-2); line-height: 1.5; }
      .comment-bullet { color: var(--c-accent); font-size: 12px; flex-shrink: 0; font-family: var(--font-mono); }
      .file-link {
        display: flex; align-items: center; gap: var(--sp-3);
        padding: 8px 10px; border-radius: var(--r-sm);
        background: var(--c-canvas); border: 1px solid var(--c-border);
        transition: border-color 150ms ease; text-decoration: none; margin-bottom: 6px;
      }
      .file-link:hover { border-color: var(--c-blue-link); }
      .file-icon { font-size: 16px; flex-shrink: 0; color: var(--c-blue-link); }
      .file-info { display: flex; flex-direction: column; min-width: 0; }
      .file-name { font-size: 12px; color: var(--c-text-1); font-family: var(--font-mono); }
      .file-path { font-size: 10px; color: var(--c-text-3); font-family: var(--font-mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .file-ext { margin-left: auto; color: var(--c-text-3); font-size: 12px; }
      .file-ext:hover { color: var(--c-blue-link); }

      /* ===== CONTACT SOCIAL ===== */
      .contact-social { display: flex; gap: var(--sp-2); justify-content: center; margin-top: var(--sp-6); }
      .contact-social a {
        display: flex; align-items: center; gap: var(--sp-2);
        padding: 8px 14px; border-radius: var(--r-md);
        background: var(--c-surface-2); border: 1px solid var(--c-border);
        color: var(--c-text-2); font-family: var(--font-body); font-weight: 500; font-size: 12px;
        text-decoration: none; transition: all 150ms ease;
      }
      .contact-social a:hover { color: var(--c-text-1); border-color: var(--c-border-hover); background: var(--c-surface-3); }
      .contact-btn {
        display: inline-flex; align-items: center; gap: var(--sp-2); height: 40px;
        padding: 0 20px; border-radius: var(--r-md); background: var(--c-accent); border: none;
        color: var(--c-text-1); font-family: var(--font-body); font-weight: 500; font-size: 13px;
        cursor: pointer; transition: all 200ms ease; text-decoration: none;
      }
      .contact-btn:hover { filter: brightness(1.08); }

      /* ===== CHAT WIDGET ===== */
      .chat-toggle {
        position: fixed; bottom: 6.5rem; right: 2rem; z-index: 1000;
        width: 52px; height: 52px; border-radius: 50%;
        background: var(--c-accent); color: var(--c-text-1);
        border: none; cursor: pointer; display: flex;
        align-items: center; justify-content: center;
        box-shadow: 0 8px 24px rgba(230, 57, 70, 0.3);
        transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
      }
      .chat-toggle:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 12px 32px rgba(230, 57, 70, 0.4); }
      #chat-bubble {
        position: fixed; bottom: 2rem; right: 2rem; z-index: 999;
