    <style>
      :root {
        --color-bg-base:        #0D0D0D;
        --color-bg-surface:     #141414;
        --color-bg-elevated:    #1C1C1C;
        --color-bg-subtle:      #242424;
        --color-accent-primary: #E63946;
        --color-accent-warm:    #FF6B35;
        --color-accent-gold:    #F4A261;
        --color-accent-sage:    #52B788;
        --color-accent-indigo:  #6366F1;
        --color-text-primary:   #F5F0EB;
        --color-text-secondary: #A89F94;
        --color-text-tertiary:  #5C5550;
        --color-text-on-accent: #FFFFFF;
        --color-border-default: #2A2A2A;
        --color-border-hover:   #3D3835;
        --color-border-accent:  #E63946;
        --font-display: 'Playfair Display', Georgia, serif;
        --font-body:    'DM Sans', system-ui, sans-serif;
        --font-mono:    'JetBrains Mono', 'Fira Code', monospace;
        --text-hero:       clamp(56px, 8vw, 96px);
        --text-display:    clamp(36px, 5vw, 56px);
        --text-heading:    clamp(20px, 3vw, 28px);
        --text-subheading: 18px;
        --text-body:       16px;
        --text-small:      14px;
        --text-micro:      12px;
        --text-eyebrow:    11px;
        --space-1: 4px;   --space-2: 8px;   --space-3: 12px;
        --space-4: 16px;  --space-5: 24px;  --space-6: 32px;
        --space-7: 48px;  --space-8: 64px;  --space-9: 96px;
        --space-10: 128px;
        --gap-sm: 16px;   --gap-md: 24px;   --gap-lg: 48px;
        --container-max: 1280px;
        --container-pad: clamp(16px, 5vw, 80px);
        --radius-sm:   6px;
        --radius-md:   12px;
        --radius-lg:   16px;
        --radius-xl:   24px;
        --radius-full: 9999px;
        --ease-spring:   cubic-bezier(0.16, 1, 0.3, 1);
        --ease-out:      cubic-bezier(0, 0, 0.2, 1);
        --ease-in-out:   cubic-bezier(0.4, 0, 0.2, 1);
        --duration-fast:   150ms;
        --duration-base:   200ms;
        --duration-slow:   400ms;
        --duration-reveal: 600ms;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        font-family: var(--font-body); background: var(--color-bg-base); color: var(--color-text-primary);
        line-height: 1.6; overflow-x: hidden;
      }
      a { color: inherit; text-decoration: none; }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--color-bg-base); }
      ::-webkit-scrollbar-thumb { background: var(--color-accent-primary); border-radius: 3px; }

      section { position: relative; z-index: 1; padding: var(--space-9) 0; }
      .container { max-width: var(--container-max); margin: 0 auto; padding: 0 var(--container-pad); }

      /* Navbar */
      .navbar {
        position: fixed; top: var(--space-5); left: 50%; transform: translateX(-50%);
        z-index: 100; display: flex; align-items: center; gap: var(--space-6);
        padding: var(--space-3) var(--space-6);
        background: rgba(20,20,20,0.85); backdrop-filter: blur(20px);
        border: 1px solid var(--color-border-default); border-radius: var(--radius-full);
        animation: nav-drop-in 600ms var(--ease-spring) forwards;
        animation-delay: 100ms; opacity: 0;
      }
      .nav-link {
        font-family: var(--font-body); font-weight: 500; font-size: 14px;
        color: var(--color-text-secondary); position: relative;
        transition: color var(--duration-base) ease; cursor: pointer;
      }
      .nav-link:hover { color: var(--color-text-primary); }
      .nav-link::after {
        content: ''; position: absolute; bottom: -2px; left: 0;
        width: 0%; height: 1px; background: var(--color-accent-primary);
        transition: width var(--duration-base) var(--ease-spring);
      }
      .nav-link:hover::after { width: 100%; }
      .nav-link.active { color: var(--color-text-primary); }
      .nav-link.active .nav-dot {
        width: 4px; height: 4px; border-radius: 50%; background: var(--color-accent-primary);
        display: block; margin: 2px auto 0;
      }
      .resume-nav-btn {
        font-family: var(--font-body); font-weight: 500; font-size: 13px;
        color: var(--color-text-primary); padding: 6px 16px;
        border: 1px solid var(--color-border-hover); border-radius: var(--radius-md);
        transition: all var(--duration-base) ease; cursor: pointer;
        background: transparent;
      }
      .resume-nav-btn:hover {
        border-color: var(--color-accent-primary); color: var(--color-text-on-accent);
        background: var(--color-accent-primary);
      }

      /* Hero */
      .hero-section { min-height: 100vh; display: flex; align-items: center; position: relative; overflow: hidden; }
      .hero-bg-grid {
        position: absolute; inset: 0; z-index: 0;
        background-image: radial-gradient(circle, rgba(245,240,235,0.06) 1px, transparent 1px);
        background-size: 28px 28px;
      }
      .hero-glow {
        position: absolute; left: -10%; top: 50%; transform: translateY(-50%);
        width: 600px; height: 400px;
        background: radial-gradient(ellipse at center, rgba(230,57,70,0.06) 0%, transparent 70%);
        z-index: 0; pointer-events: none;
      }
      .hero-inner { position: relative; z-index: 1; display: flex; gap: var(--gap-lg); align-items: center; }
      .hero-left { flex: 1; min-width: 280px; }
      .hero-eyebrow {
        font-family: var(--font-mono); font-size: var(--text-eyebrow);
        color: var(--color-text-tertiary); letter-spacing: 0.12em; text-transform: uppercase;
        margin-bottom: var(--space-4); opacity: 0;
        animation: fadeUp 600ms var(--ease-spring) 300ms forwards;
      }
      .hero-name {
        font-family: var(--font-display); font-weight: 700; font-size: var(--text-hero);
        color: var(--color-text-primary); line-height: 1.0; margin-bottom: var(--space-5);
        opacity: 0; transform: translateY(12px);
        animation: name-glow-in 1000ms var(--ease-spring) 500ms forwards;
      }
      .hero-name .initial { color: var(--color-accent-primary); }
      .hero-subtitle {
        font-family: var(--font-body); font-weight: 500; font-size: var(--text-subheading);
        color: var(--color-text-secondary); height: 28px; margin-bottom: var(--space-5);
        opacity: 0; animation: fadeUp 600ms var(--ease-spring) 900ms forwards;
      }
      .hero-subtitle .typewriter-cursor {
        display: inline-block; width: 2px; height: 1.1em;
        background: var(--color-accent-primary); margin-left: 3px;
        vertical-align: text-bottom; animation: cursor-blink 900ms ease-in-out infinite;
      }
      .hero-bio {
        font-family: var(--font-body); font-weight: 400; font-size: var(--text-body);
        color: var(--color-text-secondary); max-width: 480px; line-height: 1.7;
        margin-bottom: var(--space-6); opacity: 0;
        animation: fadeUp 600ms var(--ease-spring) 1100ms forwards;
      }
      .hero-ctas {
        display: flex; gap: var(--space-4); margin-bottom: var(--space-6);
        opacity: 0; animation: fadeUp 600ms var(--ease-spring) 1300ms forwards;
      }
      .hero-stat-pills {
        display: flex; gap: var(--gap-sm); flex-wrap: wrap;
        opacity: 0; animation: fadeUp 600ms var(--ease-spring) 1500ms forwards;
      }
      .stat-pill {
        font-family: var(--font-mono); font-size: var(--text-micro);
        color: var(--color-text-tertiary); background: var(--color-bg-elevated);
        border-radius: var(--radius-full); padding: 6px 16px;
        border: 1px solid var(--color-border-default);
      }

      /* Buttons */
      .btn-primary {
        padding: 12px 28px; height: 48px; border-radius: var(--radius-md);
        background: var(--color-accent-primary); color: var(--color-text-on-accent);
        font-family: var(--font-body); font-weight: 600; font-size: 15px;
        border: none; cursor: pointer; display: inline-flex; align-items: center;
        gap: 8px; text-decoration: none;
        transition: background var(--duration-base) ease, transform var(--duration-fast) ease, box-shadow var(--duration-base) ease;
      }
      .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(230,57,70,0.3); }
      .btn-primary:active { transform: translateY(0px); box-shadow: none; transition-duration: 50ms; }
      .btn-secondary {
        padding: 12px 28px; height: 48px; border-radius: var(--radius-md);
        border: 1px solid var(--color-border-hover); background: transparent;
        color: var(--color-text-primary); font-family: var(--font-body); font-weight: 500; font-size: 15px;
        cursor: pointer; display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
        transition: all var(--duration-base) ease;
      }
      .btn-secondary:hover { border-color: var(--color-text-secondary); transform: translateY(-2px); }

      /* Section Titles */
      .section-eyebrow {
        font-family: var(--font-mono); font-size: var(--text-eyebrow);
        color: var(--color-text-tertiary); letter-spacing: 0.12em; text-transform: uppercase;
        margin-bottom: var(--space-3);
      }
      .section-title {
        font-family: var(--font-display); font-weight: 700; font-size: var(--text-display);
        color: var(--color-text-primary); line-height: 1.15; margin-bottom: var(--space-7);
        clip-path: inset(0 100% 0 0);
        transition: clip-path 700ms var(--ease-spring);
      }
      .section-title.is-visible { clip-path: inset(0 0% 0 0); }

      /* Reveal */
      .reveal {
        opacity: 0; transform: translateY(24px);
        transition: opacity var(--duration-reveal) var(--ease-spring), transform var(--duration-reveal) var(--ease-spring);
      }
      .reveal.is-visible { opacity: 1; transform: translateY(0); }

      /* Terminal */
      .terminal-wrap { background: var(--color-bg-surface); border: 1px solid var(--color-border-default); border-radius: var(--radius-lg); overflow: hidden; box-shadow: 0 24px 64px rgba(0,0,0,0.4); max-width: 520px; }
      .terminal-header { display: flex; align-items: center; gap: 6px; padding: 10px 14px; background: var(--color-bg-elevated); border-bottom: 1px solid var(--color-border-default); }
      .t-dot { width: 11px; height: 11px; border-radius: 50%; }
      .t-title { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-tertiary); margin-left: 12px; }
      .terminal-body { padding: 18px 20px; font-family: var(--font-mono); font-size: 13px; line-height: 1.9; min-height: 140px; color: #ABB2BF; }
      .t-prompt { color: #7EC8E3; } .t-cmd { color: #E8EDF5; } .t-out { color: #98C379; } .t-dim { color: #5C5550; }
      .cursor-blink { display: inline-block; width: 7px; height: 13px; background: var(--color-accent-primary); vertical-align: middle; animation: blink 1s step-end infinite; }

      /* Masonry Grid */
      .projects-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: var(--gap-md); align-items: start;
      }
      .project-card {
        background: var(--color-bg-surface); border: 1px solid var(--color-border-default);
        border-radius: var(--radius-lg); padding: var(--space-5); position: relative;
        overflow: hidden; cursor: pointer;
        transition: transform 200ms var(--ease-spring), border-color 200ms ease, box-shadow 200ms ease;
      }
      .project-card:hover {
        transform: translateY(-4px); border-color: var(--color-border-hover);
        box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px var(--color-border-hover);
      }
      .project-card.featured {
        grid-column: span 2; border-left: 3px solid var(--color-accent-primary);
      }
      .project-card.featured:hover {
        box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 60px rgba(230,57,70,0.08);
      }
      .project-card:nth-child(1) { transition-delay: 0ms; }
      .project-card:nth-child(2) { transition-delay: 80ms; }
      .project-card:nth-child(3) { transition-delay: 160ms; }
      .project-card:nth-child(4) { transition-delay: 240ms; }
      .project-card:nth-child(5) { transition-delay: 320ms; }
      .project-card:nth-child(n+6) { transition-delay: 400ms; }

      .card-category-badge {
        font-family: var(--font-mono); font-size: 11px; border-radius: var(--radius-sm);
        padding: 4px 10px; display: inline-block; margin-bottom: var(--space-3);
      }
      .card-category-badge.ai { background: rgba(99,102,241,0.15); color: #818CF8; border: 1px solid rgba(99,102,241,0.3); }
      .card-category-badge.fullstack { background: rgba(255,107,53,0.15); color: #FF8C69; border: 1px solid rgba(255,107,53,0.3); }
      .card-category-badge.client { background: rgba(82,183,136,0.15); color: #6EE7B7; border: 1px solid rgba(82,183,136,0.3); }
      .card-category-badge.hackathon { background: rgba(244,162,97,0.15); color: #FBD38D; border: 1px solid rgba(244,162,97,0.3); }

      .status-dot { width: 8px; height: 8px; border-radius: 50%; position: absolute; top: var(--space-5); right: var(--space-5); }
      .status-dot.live { background: var(--color-accent-sage); animation: status-pulse 2.5s ease-in-out infinite; }
      .status-dot.wip { background: var(--color-accent-gold); animation: status-pulse 1.8s ease-in-out infinite; }

      .card-title { font-family: var(--font-body); font-weight: 600; font-size: var(--text-heading); color: var(--color-text-primary); margin: var(--space-3) 0 var(--space-2); }
      .card-desc { font-family: var(--font-body); font-weight: 400; font-size: 14px; color: var(--color-text-secondary); line-height: 1.6; margin-bottom: var(--space-4); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
      .card-metric { color: var(--color-accent-gold); font-family: var(--font-mono); font-weight: 500; font-size: 28px; line-height: 1; margin-bottom: 2px; }
      .card-metric-label { color: var(--color-text-tertiary); font-size: var(--text-eyebrow); font-family: var(--font-mono); }
      .card-stack { display: flex; gap: var(--space-2); overflow-x: auto; padding-bottom: var(--space-2); margin-bottom: var(--space-4); flex-wrap: wrap; }
      .card-stack-tag { font-family: var(--font-mono); font-size: 11px; border-radius: var(--radius-sm); padding: 3px 8px; background: var(--color-bg-elevated); color: var(--color-text-tertiary); border: 1px solid var(--color-border-default); white-space: nowrap; transition: border-color var(--duration-base) ease; }
      .card-stack-tag:hover { border-color: var(--color-accent-warm); }
      .card-footer { display: flex; justify-content: space-between; align-items: center; }
      .card-footer a { font-size: 12px; color: var(--color-text-tertiary); display: flex; align-items: center; gap: 4px; }
      .card-footer a:hover { color: var(--color-text-primary); }
      .card-arrow { opacity: 0; transform: translate(-4px, 4px); transition: opacity 200ms ease, transform 200ms var(--ease-spring); font-size: 16px; color: var(--color-text-secondary); }
      .project-card:hover .card-arrow { opacity: 1; transform: translate(0, 0); }
      .card-arch {
        font-family: var(--font-mono); font-size: 12px; color: var(--color-text-tertiary);
        background: var(--color-bg-elevated); border-radius: var(--radius-sm);
        padding: var(--space-3); margin-top: var(--space-3); line-height: 1.6;
      }

      /* Skills */
      .skills-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: var(--gap-md); align-items: start;
      }
      .skill-cluster {
        background: var(--color-bg-surface); border: 1px solid var(--color-border-default);
        border-radius: var(--radius-lg); padding: 20px 24px;
      }
      .skill-cluster-label {
        font-family: var(--font-mono); font-size: 11px; text-transform: uppercase;
        letter-spacing: 0.12em; color: var(--color-text-tertiary); margin-bottom: var(--space-4);
      }
      .skill-tags { display: flex; flex-wrap: wrap; gap: var(--space-2); }
      .skill-tag {
        font-family: var(--font-body); font-weight: 500; font-size: 13px;
        border-radius: var(--radius-full); padding: 6px 14px;
        background: var(--color-bg-elevated); color: var(--color-text-secondary);
        border: 1px solid var(--color-border-default);
        transition: background var(--duration-fast) ease, color var(--duration-fast) ease, border-color var(--duration-fast) ease, transform var(--duration-fast) ease;
      }
      .skill-tag:hover {
        background: var(--color-bg-subtle); color: var(--color-text-primary);
        border-color: var(--color-accent-warm); transform: translateY(-1px);
      }

      /* Contact */
      .contact-wrap { max-width: 640px; margin: 0 auto; }
      .contact-heading {
        font-family: var(--font-display); font-weight: 700; font-size: var(--text-display);
        color: var(--color-text-primary); margin-bottom: var(--space-3);
      }
      .contact-sub {
        font-family: var(--font-body); font-size: var(--text-body);
        color: var(--color-text-secondary); margin-bottom: var(--space-7);
      }
      .contact-form { display: flex; flex-direction: column; gap: var(--space-5); }
      .form-field { display: flex; flex-direction: column; gap: var(--space-1); }
      .form-field label { font-family: var(--font-mono); font-size: var(--text-micro); color: var(--color-text-tertiary); }
      .form-field input, .form-field select, .form-field textarea {
        background: var(--color-bg-surface); border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md); font-family: var(--font-body); font-weight: 400;
        font-size: 15px; color: var(--color-text-primary); padding: 12px 16px;
        outline: none; transition: border-color 200ms ease, box-shadow 200ms ease;
      }
      .form-field input:focus, .form-field select:focus, .form-field textarea:focus {
        border-color: var(--color-accent-primary);
        box-shadow: 0 0 0 3px rgba(230,57,70,0.12);
      }
      .form-field input::placeholder, .form-field textarea::placeholder { color: var(--color-text-tertiary); }
      .form-field textarea { min-height: 130px; resize: vertical; }
      .contact-form .btn-primary { width: 100%; height: 52px; justify-content: center; font-size: 16px; }
      .form-error { color: var(--color-accent-primary); font-size: 13px; font-family: var(--font-body); }
      .form-success { text-align: center; padding: var(--space-8) 0; }
      .form-success p:first-child { font-family: var(--font-body); font-weight: 600; font-size: 20px; color: var(--color-accent-sage); margin-bottom: var(--space-3); }
      .form-success p:last-child { font-size: 14px; color: var(--color-text-secondary); }

      .social-links { display: flex; gap: var(--space-6); justify-content: center; margin-top: var(--space-7); }
      .social-link { color: var(--color-text-tertiary); font-size: 14px; display: flex; align-items: center; gap: 6px; position: relative; transition: color var(--duration-base) ease; }
      .social-link:hover { color: var(--color-text-primary); }
      .social-link::after {
        content: ''; position: absolute; bottom: -2px; left: 0;
        width: 0%; height: 1px; background: var(--color-accent-primary);
        transition: width var(--duration-base) var(--ease-spring);
      }
      .social-link:hover::after { width: 100%; }

      /* Modal */
      .modal-overlay {
        position: fixed; inset: 0; z-index: 10000;
        background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
        display: flex; align-items: center; justify-content: center;
        padding: var(--space-5); animation: fadeIn 200ms ease;
      }
      .modal-content {
        background: var(--color-bg-surface); border: 1px solid var(--color-border-hover);
        border-radius: var(--radius-xl); max-width: 700px; width: 100%;
        max-height: 85vh; overflow-y: auto; padding: var(--space-7);
        transform: translateY(40px) scale(0.97); opacity: 0;

      .modal-close {

      .modal-section { margin-bottom: var(--space-5); }
      .modal-section h3 { font-family: var(--font-mono); font-size: 11px; color: var(--color-accent-primary); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: var(--space-2); }

      .modal-section li { font-size: 14px; color: var(--color-text-secondary); line-height: 1.7; padding-left: var(--space-4); position: relative; }
      .modal-section li::before { content: '▹'; color: var(--color-accent-primary); position: absolute; left: 0; }
      .modal-metric-box { padding: var(--space-4); background: var(--color-bg-elevated); border-radius: var(--radius-md); border: 1px solid var(--color-border-default); }
      .modal-metric-box h3 { font-family: var(--font-mono); font-size: 11px; color: var(--color-accent-gold); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: var(--space-2); }
      .modal-metric-box p { font-size: 20px; color: var(--color-accent-gold); font-family: var(--font-mono); font-weight: 500; }

      /* GitHub Feed */
      .github-card { background: var(--color-bg-surface); border: 1px solid var(--color-border-default); border-radius: var(--radius-lg); padding: var(--space-5); margin-bottom: var(--space-4); transition: all var(--duration-base) ease; }
      .github-card:hover { border-color: var(--color-border-hover); }

      .chat-toggle {
        position: fixed; bottom: 6.5rem; right: 2rem; z-index: 1000;

      .mv-bot { background: var(--color-accent-indigo); color: #fff; } .mv-user { background: var(--color-bg-elevated); color: #fff; }
      .msg-bubble { padding: 10px 14px; border-radius: 14px; font-size: 13px; max-width: 85%; }
      .mb-bot { background: var(--color-bg-elevated); color: var(--color-text-primary); border-bottom-left-radius: 4px; }
      .mb-user { background: var(--color-accent-primary); color: #fff; border-bottom-right-radius: 4px; }
      .chat-inp-row { display: flex; padding: var(--space-3); border-top: 1px solid var(--color-border-default); gap: 8px; background: var(--color-bg-subtle); }
      .chat-inp-row input { flex: 1; padding: 10px 14px; border-radius: var(--radius-sm); border: 1px solid var(--color-border-default); background: var(--color-bg-surface); color: var(--color-text-primary); outline: none; font-family: var(--font-body); }
      .chat-inp-row input:focus { border-color: var(--color-accent-primary); }
      .chat-inp-row button { padding: 0 16px; border-radius: var(--radius-sm); background: var(--color-accent-primary); color: white; border: none; cursor: pointer; }

      /* Back to Top */
      .back-to-top {
        position: fixed; bottom: 2rem; right: 2rem;
        width: 44px; height: 44px; border-radius: 50%;
        background: var(--color-bg-elevated); color: var(--color-text-secondary);
        border: 1px solid var(--color-border-default);
        font-size: 1.2rem; z-index: 998;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .back-to-top:hover { background: var(--color-accent-primary); color: white; border-color: var(--color-accent-primary); transform: translateY(-3px); }

      /* Footer */
      .footer { text-align: center; padding: var(--space-7) 0; border-top: 1px solid var(--color-border-default); margin-top: var(--space-8); }
      .footer p { font-family: var(--font-mono); font-size: 12px; color: var(--color-text-tertiary); }

      /* Keyframes */
      @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes blink { 50% { opacity: 0; } }
      @keyframes cursor-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes name-glow-in {
        0% { text-shadow: none; opacity: 0; transform: translateY(12px); }
        60% { opacity: 1; transform: translateY(0); }
        100% { text-shadow: 0 0 80px rgba(230,57,70,0.15); opacity: 1; transform: translateY(0); }
      }
      @keyframes nav-drop-in {
        0% { opacity: 0; transform: translateX(-50%) translateY(-16px); }
        100% { opacity: 1; transform: translateX(-50%) translateY(0); }
      }
      @keyframes status-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(0.85); }
      }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes modalIn {
        from { opacity: 0; transform: translateY(40px) scale(0.97); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      @media (prefers-reduced-motion: no-preference) {
        .reveal, .section-title, .hero-eyebrow, .hero-name, .hero-subtitle, .hero-bio, .hero-ctas, .hero-stat-pills { animation-play-state: running; }
      }

      /* Mobile */
      @media (max-width: 768px) {
        .navbar { top: var(--space-3); padding: var(--space-2) var(--space-4); gap: var(--space-3); }
        .nav-link { font-size: 12px; }
        .hero-section { padding-top: 5rem; }
        .hero-inner { flex-direction: column; gap: var(--space-5); }
        .hero-left { text-align: left; }
        .hero-ctas { flex-direction: column; align-items: flex-start; }
        .projects-grid { grid-template-columns: 1fr; }
        .project-card.featured { grid-column: span 1; }
        .skills-grid { grid-template-columns: 1fr; }
        .chat-toggle { right: 1rem; bottom: 5.5rem; width: 48px; height: 48px; }
        #chat-bubble { width: calc(100vw - 2rem); right: 1rem; bottom: 1rem; }
        .back-to-top { bottom: 1rem; right: 1rem; width: 40px; height: 40px; }
        .social-links { flex-direction: column; align-items: center; gap: var(--space-4); }
      }
/* --- BULLETPROOF MOBILE RESPONSIVENESS --- */
      @media (max-width: 768px) {
        /* 1. Prevent horizontal scroll & scaling issues entirely */
        html, body { width: 100%; max-width: 100vw; overflow-x: hidden; margin: 0; padding: 0; }
        .container { width: 100%; padding: 0 1.2rem; box-sizing: border-box; overflow-x: hidden; }
        
        /* 2. Force ALL inline 300px/500px cards to collapse and fit the screen */
        div[style*="flex: 1 1 500px"], 
        div[style*="flex: 1 1 300px"],
        div[style*="minWidth: 300px"],
        div[style*="minWidth: 280px"],
        .terminal-wrap, 
        .tl-card {
          flex: 1 1 100% !important;
          min-width: 0 !important;
          max-width: 100% !important;
          width: 100% !important;
          box-sizing: border-box;
        }
        
        /* 3. Constrain images (like the Github charts) so they don't stretch */
        img { max-width: 100% !important; object-fit: contain; }

        /* 4. Nav adjusts to fit cleanly */
        nav { padding: 1rem; flex-wrap: wrap; justify-content: center; gap: 0.5rem; }
        .theme-btn { position: absolute; top: 1rem; right: 1rem; }
        .nav-logo { position: absolute; top: 1.2rem; left: 1rem; }
        .nav-links { margin-top: 2rem; width: 100%; justify-content: center; gap: 1rem; flex-wrap: wrap; }
        .nav-links a { font-size: 0.75rem; }
        .nav-links a span { display: none; } /* Hides numbers to save space */
        
        /* 5. Hero & Sections stack and center */
        #hero { padding-top: 7rem !important; }
        .hero-inner { flex-direction: column; text-align: center; gap: 2rem !important; }
        .hero-sub { margin-left: auto; margin-right: auto; }
        .hero-inner div[style*="display: flex"] { justify-content: center; flex-wrap: wrap; }
        section { padding: 4rem 0; }
        
        /* 6. Timeline adjustments for small screens */
        .timeline::before { left: 8px; }
        .tl-dot { width: 10px; height: 10px; margin-left: -5px; }
        .tl-item { gap: 1rem; flex-direction: column; }
        .tl-item > div:first-child { display: none; } 
        .timeline::before { display: none; } 
        
        /* 7. Chat Widget sizes perfectly to the phone */
        .chat-toggle { bottom: 1.2rem; right: 1.2rem; width: 56px; height: 56px; }
        #chat-bubble { width: calc(100vw - 2.4rem); right: 1.2rem; bottom: 5.5rem; }
      }
    </style>
