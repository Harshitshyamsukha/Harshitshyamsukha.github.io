    <style>
      :root {
        --color-surface: #0d0306;
        --color-surface-dim: #0d0306;
        --color-surface-bright: #2d151c;
        --color-surface-lowest: #080204;
        --color-surface-low: #16070d;
        --color-surface-container: #1c0a12;
        --color-surface-high: #221015;
        --color-surface-highest: #2d151c;
        --color-surface-variant: #221015;
        --color-on-surface: #ffffff;
        --color-on-surface-variant: #d4d4d4;
        --color-outline: #555555;
        --color-outline-variant: #3a3a3a;
        --color-primary: #d4d4d4;
        --color-primary-container: #2a2a2a;
        --color-on-primary: #0d0d0d;
        --color-on-primary-container: #d4d4d4;
        --color-primary-fixed: #e0e0e0;
        --color-primary-fixed-dim: #cccccc;
        --color-secondary: #d4d4d4;
        --color-tertiary: #d4d4d4;
        --color-error: #ffb4ab;
        --color-error-container: #93000a;
        --color-background: #000000;
        --color-on-background: #ffffff;
        --font-display: 'Geist', system-ui, sans-serif;
        --font-body: 'Geist', system-ui, sans-serif;
        --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        --text-display-lg: clamp(36px, 6vw, 48px);
        --text-headline-md: clamp(22px, 3vw, 24px);
        --text-headline-sm: clamp(18px, 2.5vw, 20px);
        --text-body-lg: 16px;
        --text-body-md: 14px;
        --text-label-caps: 12px;
        --text-code-sm: 12px;
        --space-1: 4px;   --space-2: 8px;   --space-3: 12px;
        --space-4: 16px;  --space-5: 20px;  --space-6: 24px;
        --space-7: 32px;  --space-8: 48px;  --space-9: 64px;
        --space-10: 96px;
        --container-margin-desktop: 4rem;
        --container-margin-mobile: 1rem;
        --masonry-gutter: 1.5rem;
        --card-padding: 1rem;
        --stack-gap: 0.75rem;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-xl: 16px;
        --radius-full: 9999px;
        --ease-spring: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-out: cubic-bezier(0, 0, 0.2, 1);
        --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
        --duration-fast: 150ms;
        --duration-base: 200ms;
        --duration-slow: 400ms;
        --duration-reveal: 600ms;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        font-family: var(--font-body); font-weight: 400; font-size: var(--text-body-md);
        line-height: 20px; background: var(--color-background); color: var(--color-on-background);
        overflow-x: hidden; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      }
      a { color: inherit; text-decoration: none; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--color-background); }
      ::-webkit-scrollbar-thumb { background: var(--color-primary); border-radius: 3px; }

      section { position: relative; z-index: 1; padding: var(--space-9) 0; }
      #hero { background: url('/backgrounds/Gemini_Generated_Image_mkm812mkm812mkm8.png') center/cover no-repeat; }

      #hero > * { position: relative; z-index: 1; }
      #skills { background: url('/backgrounds/Gemini_Generated_Image_necbz3necbz3necb%20(1).png') center/cover no-repeat; }
      #skills::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.7); z-index: 0; }
      #skills > * { position: relative; z-index: 1; }
      #experience { background: url('/backgrounds/Gemini_Generated_Image_necbz3necbz3necb%20(3).png') center/cover no-repeat; }
      #experience::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.7); z-index: 0; }
      #experience > * { position: relative; z-index: 1; }
      #projects { background: url('/backgrounds/Gemini_Generated_Image_necbz3necbz3necb%20(2).png') center/cover no-repeat; }
      #projects::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.7); z-index: 0; }
      #projects > * { position: relative; z-index: 1; }
      #certifications { background: url('/backgrounds/Gemini_Generated_Image_necbz3necbz3necb%20(4).png') center/cover no-repeat; }
      #certifications::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.7); z-index: 0; }
      #certifications > * { position: relative; z-index: 1; }
      #activity { background: url('/backgrounds/Gemini_Generated_Image_necbz3necbz3necbz.png') center/cover no-repeat; }
      #activity::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.7); z-index: 0; }
      #activity > * { position: relative; z-index: 1; }
      .container { max-width: 1600px; margin: 0 auto; padding: 0 var(--container-margin-mobile); }
      @media (min-width: 768px) { .container { padding: 0 var(--container-margin-desktop); } }

      /* ===== NAVBAR ===== */
      .navbar {
        position: fixed; top: 0; left: 0; right: 0; z-index: 100;
        background: rgba(30, 5, 12, 0.55); backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255,255,255,0.08);
        padding: var(--space-4) var(--container-margin-mobile);
        overflow: hidden;
      }
      @media (min-width: 768px) { .navbar { padding: var(--space-4) var(--container-margin-desktop); } }
      .navbar-inner {
        max-width: 1600px; margin: 0 auto;
        display: flex; justify-content: space-between; align-items: center;
      }
      .nav-brand {
        font-family: var(--font-display); font-weight: 700;
        font-size: var(--text-headline-sm); color: #f5e0d8;
        letter-spacing: -0.02em; display: flex; align-items: center; gap: var(--space-2);
      }
      .nav-links { display: none; align-items: center; gap: var(--space-8); }
      @media (min-width: 768px) { .nav-links { display: flex; } }
      .nav-link {
        font-size: var(--text-body-md); color: #ffffff;
        transition: color var(--duration-base) ease; cursor: pointer;
        padding: var(--space-2) var(--space-3); position: relative; overflow: hidden;
        border-radius: var(--radius-sm); text-decoration: none;
      }
      .nav-link:hover { text-decoration: underline; color: #ffffff; }
      .nav-link.active { color: #ffffff; font-weight: 600; text-decoration: underline; }
      .nav-link .ripple {
        position: absolute; border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
        transform: scale(0); animation: nav-ripple 600ms ease-out forwards;
        pointer-events: none;
      }
      @keyframes nav-ripple {
        to { transform: scale(4); opacity: 0; }
      }
      .nav-actions { display: flex; align-items: center; gap: var(--space-3); }
      .nav-icon-btn {
        padding: var(--space-2); border-radius: var(--radius-full);
        border: none; background: transparent; color: rgba(245, 224, 216, 0.7);
        cursor: pointer; transition: all var(--duration-base) ease; position: relative; overflow: hidden;
      }
      .nav-icon-btn:hover { color: #f5e0d8; background: rgba(255,255,255,0.08); }

      /* ===== HERO ===== */
      .hero-section { min-height: 100vh; display: flex; align-items: center; position: relative; overflow: hidden; padding-top: 5rem; }
      .hero-inner { display: flex; gap: var(--space-8); align-items: center; }
      .hero-left { flex: 1; min-width: 280px; }
      .hero-right { flex-shrink: 0; }
      @media (max-width: 768px) { .hero-inner { flex-direction: column; } .hero-right { width: 100%; } }
      .hero-name {
        font-family: var(--font-display); font-weight: 700; font-size: var(--text-display-lg);
        color: var(--color-on-background); line-height: 1.1; letter-spacing: -0.02em;
        margin-bottom: var(--space-4);
        opacity: 0; transform: translateY(12px);
        animation: fadeUp 800ms var(--ease-spring) 400ms forwards;
      }
      .hero-name .initial { color: #D4A853; }
      .hero-subtitle {
        font-family: var(--font-body); font-weight: 400; font-size: var(--text-body-lg);
        color: var(--color-on-surface-variant); line-height: 1.6;
        max-width: 540px; margin-bottom: var(--space-7);
        opacity: 0; animation: fadeUp 600ms var(--ease-spring) 700ms forwards;
      }
      .hero-subtitle .typewriter-cursor {
        display: inline-block; width: 2px; height: 1.1em;
        background: var(--color-primary); margin-left: 2px;
        vertical-align: text-bottom; animation: cursor-blink 900ms ease-in-out infinite;
      }
      .hero-bio {
        color: var(--color-on-surface-variant); margin-bottom: var(--space-7);
        opacity: 0; animation: fadeUp 600ms var(--ease-spring) 900ms forwards;
      }
      .hero-actions {
        display: flex; gap: var(--space-4); margin-bottom: var(--space-7);
        opacity: 0; animation: fadeUp 600ms var(--ease-spring) 1100ms forwards;
      }
      .hero-stat-pills {
        display: flex; gap: var(--space-3); flex-wrap: wrap;
        opacity: 0; animation: fadeUp 600ms var(--ease-spring) 1300ms forwards;
      }

      /* ===== TERMINAL ===== */
      .terminal-wrap {
        background: #1e1e1e; border: 1px solid #333;
        border-radius: var(--radius-lg); overflow: hidden;
        box-shadow: 0 24px 64px rgba(0,0,0,0.5); min-width: 400px; max-width: 480px;
        opacity: 0; transform: translateY(12px);
        animation: fadeUp 800ms var(--ease-spring) 600ms forwards;
      }
      .terminal-header {
        display: flex; align-items: center; gap: 6px;
        padding: 10px 14px; background: #2d2d2d;
        border-bottom: 1px solid #333;
      }
      .t-dot { width: 11px; height: 11px; border-radius: 50%; }
      .t-title { font-family: var(--font-mono); font-size: 11px; color: #999; margin-left: 12px; }
      .terminal-body {
        padding: 18px 20px; font-family: var(--font-mono); font-size: 13px;
        line-height: 1.9; min-height: 120px; color: #d4d4d4;
      }
      .t-prompt { color: #4edea3; }
      .t-cmd { color: #d4d4d4; }
      .t-out { color: #6a9955; }
      .t-dim { color: #808080; }
      .cursor-blink {
        display: inline-block; width: 7px; height: 13px;
        background: #d4d4d4; vertical-align: middle;
        animation: blink 1s step-end infinite;
      }
      @media (max-width: 768px) { .terminal-wrap { min-width: 0; max-width: 100%; } }

      /* ===== BUTTONS ===== */
      .btn-primary {
        padding: 12px 24px; border-radius: var(--radius-full);
        background: var(--color-primary); color: var(--color-on-primary);
        font-family: var(--font-body); font-weight: 600; font-size: var(--text-label-caps);
        letter-spacing: 0.03em; border: none; cursor: pointer;
        display: inline-flex; align-items: center; gap: var(--space-2);
        transition: background var(--duration-base) ease, transform var(--duration-fast) ease, box-shadow var(--duration-base) ease;
      }
      .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(180, 180, 180, 0.25); }
      .btn-primary:active { transform: translateY(0); }
      .btn-secondary {
        padding: 12px 24px; border-radius: var(--radius-full);
        border: 1px solid rgba(180, 180, 180, 0.3); background: transparent;
        color: var(--color-primary); font-family: var(--font-body);
        font-weight: 500; font-size: var(--text-label-caps); letter-spacing: 0.03em;
        cursor: pointer; display: inline-flex; align-items: center; gap: var(--space-2);
        transition: all var(--duration-base) ease;
      }
      .btn-secondary:hover { background: rgba(180, 180, 180, 0.1); transform: translateY(-2px); }

      /* ===== SECTION HEADERS ===== */
      .section-eyebrow {
        font-family: var(--font-mono); font-size: var(--text-code-sm);
        color: var(--color-primary); letter-spacing: 0.05em; text-transform: uppercase;
        margin-bottom: var(--space-3); display: flex; align-items: center; gap: var(--space-2);
      }
      .section-title {
        font-family: var(--font-display); font-weight: 700; font-size: var(--text-display-lg);
        color: var(--color-on-background); line-height: 1.15; letter-spacing: -0.02em;
        margin-bottom: var(--space-8);
        clip-path: inset(0 100% 0 0);
        transition: clip-path 700ms var(--ease-spring);
      }
      .section-title.is-visible { clip-path: inset(0 0% 0 0); }

      /* ===== REVEAL ===== */
      .reveal {
        opacity: 0; transform: translateY(20px);
        transition: opacity var(--duration-reveal) var(--ease-spring), transform var(--duration-reveal) var(--ease-spring);
      }
      .reveal.is-visible { opacity: 1; transform: translateY(0); }

      /* ===== MASONRY GRID ===== */
      .masonry-grid { column-count: 1; column-gap: var(--masonry-gutter); }
      @media (min-width: 640px) { .masonry-grid { column-count: 2; } }
      @media (min-width: 1024px) { .masonry-grid { column-count: 3; } }
      @media (min-width: 1440px) { .masonry-grid { column-count: 4; } }
      .masonry-item { break-inside: avoid; margin-bottom: var(--masonry-gutter); }
      .cards-grid {
        display: grid; grid-template-columns: 1fr;
        gap: var(--masonry-gutter); align-items: stretch;
      }
      @media (min-width: 640px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } }
      @media (min-width: 1024px) { .cards-grid { grid-template-columns: repeat(3, 1fr); } }

      /* ===== PROJECT CARDS ===== */
      .project-card {
        background: var(--color-surface-low); border: 1px solid rgba(255,255,255,0.05);
        border-radius: var(--radius-xl); overflow: hidden;
        transition: all 500ms ease;
        display: flex; flex-direction: column;
      }
      .project-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 40px -12px rgba(80, 80, 80, 0.15);
      }
      .card-media {
        position: relative; width: 100%; height: 200px;
        background: var(--color-surface-high); overflow: hidden;
      }
      .card-media img {
        width: 100%; height: 100%; object-fit: cover;
        transition: transform 700ms ease-out;
      }
      .project-card:hover .card-media img { transform: scale(1.05); }
      .card-media-overlay {
        position: absolute; inset: 0;
        background: linear-gradient(to top, var(--color-surface-low) 0%, transparent 60%);
        opacity: 0.9;
      }
      .card-media .badge-wrap {
        position: absolute; top: var(--space-3); right: var(--space-3);
        display: flex; gap: var(--space-2);
      }
      .card-category-badge {
        font-family: var(--font-mono); font-size: var(--text-code-sm);
        padding: 3px 10px; border-radius: var(--radius-full);
        background: #2a2a2a; border: 1px solid #3a3a3a;
        color: #d4d4d4;
      }
      .status-dot { width: 8px; height: 8px; border-radius: 50%; }
      .status-dot.live { background: var(--color-primary); }
      .status-dot.wip { background: var(--color-tertiary); }
      .card-body { padding: var(--card-padding); display: flex; flex-direction: column; gap: var(--space-3); flex: 1; }
      .card-title {
        font-family: var(--font-display); font-weight: 600; font-size: var(--text-headline-sm);
        color: var(--color-on-background); line-height: 1.3;
      }
      .card-desc {
        font-size: var(--text-body-md); color: var(--color-on-surface-variant);
        line-height: 1.6;
      }
      .card-stack { display: flex; flex-wrap: wrap; gap: var(--space-2); }
      .card-stack-tag {
        font-family: var(--font-mono); font-size: var(--text-code-sm);
        padding: 4px 12px; border-radius: var(--radius-full);
        background: #2a2a2a; border: 1px solid #3a3a3a;
        color: #d4d4d4; transition: all var(--duration-fast) ease;
      }
      .card-stack-tag:hover { text-decoration: underline; }
      .card-footer {
        display: flex; justify-content: space-between; align-items: center;
        padding: var(--card-padding); padding-top: 0; margin-top: auto;
      }
      .card-footer a {
        font-family: var(--font-mono); font-size: var(--text-code-sm);
        color: var(--color-primary); display: flex; align-items: center; gap: 4px;
        transition: color var(--duration-base) ease;
      }
      .card-footer a:hover { color: var(--color-primary-fixed); }
      .card-arch {
        font-family: var(--font-mono); font-size: var(--text-code-sm);
        color: var(--color-on-surface-variant); line-height: 1.6;
        background: var(--color-surface-high); border-radius: var(--radius-md);
        padding: var(--space-3); margin: 0 var(--card-padding) var(--space-3);
      }

      /* ===== SKILL CARDS ===== */
      .skill-card {
        background: var(--color-surface-low); border: 1px solid rgba(255,255,255,0.05);
        border-radius: var(--radius-xl); overflow: hidden;
        transition: all 500ms ease;

      }
      .skill-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 40px -12px rgba(80, 80, 80, 0.15);
      }
      .skill-media {
        position: relative; width: 100%; height: 140px;
        background: var(--color-surface-high); overflow: hidden;
      }

        width: 100%; height: 100%; object-fit: contain;
        padding: 20px; transition: transform 700ms ease-out; opacity: 0.8;
      }
      .skill-card:hover .skill-media img { transform: scale(1.05); }
      .skill-media-overlay {
        position: absolute; inset: 0;
        background: linear-gradient(to top, var(--color-surface-low) 60%, transparent 100%);
      }
      .skill-media .skill-icon {

        width: 36px; height: 36px; border-radius: var(--radius-md);
        background: var(--color-surface-variant); border: 1px solid rgba(42, 40, 38, 0.4);

      .skill-card:hover .skill-media .skill-icon { opacity: 1; }
      .skill-body { padding: var(--card-padding); display: flex; flex-direction: column; gap: var(--space-3); flex: 1; }
      .skill-tags-wrap { margin-top: auto; }
      .skill-header {
        display: flex; align-items: center; gap: var(--space-3);

      .skill-header-icon {
        width: 40px; height: 40px; border-radius: var(--radius-lg);
        background: var(--color-surface-variant); border: 1px solid rgba(42, 40, 38, 0.4);
        display: flex; align-items: center; justify-content: center;
        color: var(--color-primary);
      }
      .skill-label {
        font-family: var(--font-display); font-weight: 600; font-size: var(--text-headline-sm);
        color: var(--color-on-background);
      }
      .skill-tags { display: flex; flex-wrap: wrap; gap: var(--space-2); }
      .skill-tag {
        font-family: var(--font-mono); font-size: var(--text-code-sm);

        color: #d4d4d4; transition: all var(--duration-fast) ease;
      }
      .skill-tag:hover { text-decoration: underline; }

      /* ===== EXPERIENCE CARDS ===== */
      .exp-card {
        background: var(--color-surface-low); border: 1px solid rgba(255,255,255,0.05);
        border-radius: var(--radius-xl); overflow: hidden;
        transition: all 500ms ease; display: flex; flex-direction: column;
      }
