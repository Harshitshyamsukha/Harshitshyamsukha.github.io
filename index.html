<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.85em%22 font-size=%2285%22 font-family=%22system-ui, sans-serif%22 font-weight=%22900%22 fill=%22%2322d3ee%22>HS</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harshit Shyamsukha Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    
    <style>
      :root {
        --navy: #0A0F1E; --navy-2: #0D1525; --navy-3: #111927; --navy-4: #1A2B4A;
        --teal: #1D9E75; --teal-2: #15C48A; --teal-glow: rgba(29,158,117,0.18);
        --text: #E8EDF5; --text-muted: #7A8BA8; --text-faint: #3D4F62;
        --border: rgba(255,255,255,0.07); --border-2: rgba(29,158,117,0.3);
        --surface: rgba(255,255,255,0.04); --surface-2: rgba(255,255,255,0.07);
        --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif; --font-mono: 'JetBrains Mono', monospace;
        --radius: 12px; --radius-lg: 20px;
        --glow: 0 0 40px rgba(29,158,117,0.15);
        --transition: 0.25s cubic-bezier(.4,0,.2,1);
      }
      [data-theme="light"] {
        --navy: #F0F4FA; --navy-2: #E8EFF8; --navy-3: #DDE6F3; --navy-4: #1A2B4A;
        --text: #0F1923; --text-muted: #4A5D78; --text-faint: #8FA3B8;
        --border: rgba(0,0,0,0.08); --border-2: rgba(29,158,117,0.25);
        --surface: rgba(0,0,0,0.03); --surface-2: rgba(0,0,0,0.06);
        --teal-glow: rgba(29,158,117,0.1);
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        font-family: var(--font-body); background: var(--navy); color: var(--text);
        line-height: 1.6; overflow-x: hidden; cursor: none;
      }
      a { color: var(--teal); text-decoration: none; }
      a:hover { color: var(--teal-2); }
      
      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--navy); }
      ::-webkit-scrollbar-thumb { background: var(--teal); border-radius: 3px; }

      /* Cursor & Particles */
      #cursor-dot, #cursor-ring { position: fixed; border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); }
      #cursor-dot { width: 6px; height: 6px; background: var(--teal-2); transition: transform .1s; }
      #cursor-ring { width: 32px; height: 32px; border: 1.5px solid var(--teal); opacity: 0.5; transition: transform .18s, width .2s, height .2s; }
      #particle-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.5; }
      
      /* Nav */
      nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1rem 2.5rem; background: rgba(10,15,30,0.7); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); transition: background var(--transition); }
      [data-theme="light"] nav { background: rgba(240,244,250,0.8); }
      .nav-logo { font-family: var(--font-mono); font-size: 0.9rem; color: var(--teal-2); font-weight: 700; letter-spacing: 0.04em; }
      .nav-links { display: flex; gap: 2rem; align-items: center; }
      .nav-links a { font-size: 0.82rem; color: var(--text-muted); font-family: var(--font-mono); letter-spacing: 0.03em; transition: color var(--transition); }
      .nav-links a:hover { color: var(--teal-2); }
      .nav-links a span { color: var(--teal); margin-right: 3px; }
      .theme-btn { width: 38px; height: 22px; border-radius: 11px; border: 1px solid var(--border-2); background: var(--surface-2); cursor: pointer; position: relative; transition: background var(--transition); }
      .theme-btn::after { content: ''; position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; border-radius: 50%; background: var(--teal-2); transition: transform var(--transition); }
      [data-theme="light"] .theme-btn::after { transform: translateX(16px); }

      /* Common Elements */
      section { position: relative; z-index: 1; padding: 6rem 0; }
      .container { max-width: 1000px; margin: 0 auto; padding: 0 2rem; }
      .section-label { font-family: var(--font-mono); font-size: 0.72rem; color: var(--teal); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.5rem; }
      .section-title { font-family: var(--font-display); font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 800; color: var(--text); line-height: 1.1; margin-bottom: 0.4rem; }
      .section-divider { width: 48px; height: 3px; background: var(--teal); border-radius: 2px; margin-bottom: 2.5rem; }
      
      .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.7s ease, transform 0.7s ease; }
      .reveal.visible { opacity: 1; transform: none; }

      /* Hero */
      .hero-greeting { font-family: var(--font-mono); font-size: 0.85rem; color: var(--teal); letter-spacing: 0.12em; margin-bottom: 1rem; opacity: 0; animation: fadeUp 0.6s 0.3s forwards; }
      .hero-name { font-family: var(--font-display); font-size: clamp(2.8rem, 7vw, 5.5rem); font-weight: 800; line-height: 1.0; color: var(--text); margin-bottom: 0.8rem; opacity: 0; animation: fadeUp 0.7s 0.5s forwards; }
      .hero-sub { font-size: 1.05rem; color: var(--text-muted); max-width: 520px; margin-bottom: 2.5rem; opacity: 0; animation: fadeUp 0.7s 0.7s forwards; line-height: 1.7; }
      .btn-primary { padding: 12px 28px; border-radius: var(--radius); border: none; background: var(--teal); color: #fff; font-family: var(--font-mono); font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all var(--transition); box-shadow: 0 0 24px rgba(29,158,117,0.35); }
      .btn-primary:hover { background: var(--teal-2); color: var(--navy); transform: translateY(-2px); }
    
      
      /* Terminal */
      .terminal-wrap { background: rgba(10,15,30,0.9); border: 1px solid var(--border-2); border-radius: var(--radius-lg); overflow: hidden; box-shadow: 0 24px 64px rgba(0,0,0,0.4), var(--glow); max-width: 620px; }
      .terminal-header { display: flex; align-items: center; gap: 6px; padding: 10px 14px; background: rgba(255,255,255,0.04); border-bottom: 1px solid var(--border); }
      .t-dot { width: 11px; height: 11px; border-radius: 50%; }
      .terminal-body { padding: 18px 20px; font-family: var(--font-mono); font-size: 0.82rem; line-height: 1.9; min-height: 160px; color: #ABB2BF; }
      .t-prompt { color: #7EC8E3; } .t-cmd { color: #E8EDF5; } .t-out { color: #98C379; } .t-dim { color: #3D4F62; }
      .cursor-blink { display: inline-block; width: 8px; height: 14px; background: var(--teal-2); vertical-align: middle; animation: blink 1s step-end infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }

      /* Cards & Timelines */
      .timeline::before { content: ''; position: absolute; left: 18px; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, var(--teal), transparent); }
      .tl-item { display: flex; gap: 2rem; margin-bottom: 2.5rem; position: relative; }
      .tl-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--teal); border: 3px solid var(--navy); box-shadow: 0 0 16px var(--teal); margin-top: 6px; z-index: 1; }
      .tl-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; transition: all var(--transition); }
      .tl-card:hover { border-color: var(--border-2); box-shadow: var(--glow); }
      .stack-tag { font-family: var(--font-mono); font-size: 0.68rem; padding: 3px 9px; border-radius: 4px; background: var(--surface-2); color: var(--teal); border: 1px solid var(--border); margin-right: 6px; }
      
      /* Chat Bubble */
      #chat-bubble { position: fixed; bottom: 2rem; right: 2rem; z-index: 200; width: 340px; border-radius: var(--radius-lg); border: 1px solid var(--border-2); background: var(--navy-2); box-shadow: 0 24px 60px rgba(0,0,0,0.5); transform: scale(0.85) translateY(20px); transform-origin: bottom right; opacity: 0; pointer-events: none; transition: all 0.3s; display: flex; flex-direction: column; }
      #chat-bubble.open { opacity: 1; pointer-events: all; transform: scale(1) translateY(0); }
      .chat-hdr { background: var(--navy-4); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; color: white; font-weight: 600; font-size: 0.9rem;}
      .chat-messages { padding: 16px; height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
      .chat-msg { display: flex; gap: 8px; align-items: flex-end; }
      .chat-msg.user { flex-direction: row-reverse; }
      .msg-av { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; flex-shrink: 0; }
      .mv-bot { background: var(--teal); color: #fff; } .mv-user { background: var(--navy-4); color: #fff; }
      .msg-bubble { padding: 10px 14px; border-radius: 14px; font-size: 0.85rem; max-width: 85%; }
      .mb-bot { background: var(--surface-2); color: var(--text); border-bottom-left-radius: 4px; }
      .mb-user { background: var(--teal); color: #fff; border-bottom-right-radius: 4px; }
/* Moved Chat Input Row border to the bottom */
/* Fixed: Border back on top for the bottom input row */
      .chat-inp-row { display: flex; padding: 12px; border-top: 1px solid var(--border); gap: 8px; background: var(--navy-3); }
      .chat-inp-row input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); outline: none; }
      .chat-inp-row button { padding: 0 16px; border-radius: 8px; background: var(--teal); color: white; border: none; cursor: pointer; }
      .chat-toggle { 
        position: fixed; bottom: 2rem; right: 2rem; z-index: 199; 
        width: 64px; height: 64px; border-radius: 50%; 
        background: linear-gradient(135deg, var(--teal), #0F6E56); 
        color: white; border: 1px solid rgba(255,255,255,0.2); 
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        box-shadow: 0 8px 32px rgba(29,158,117,0.4); 
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        animation: floatPulse 3s infinite ease-in-out;
      }
      .chat-toggle:hover { 
        transform: translateY(-5px) scale(.05); 
        box-shadow: 0 15px 40px rgba(29,158,117,0.6); 
        border-color: rgba(255,255,255,0.4);
      }
      .chat-toggle svg {
        transition: transform 0.4s ease;
      }
      .chat-toggle:hover svg {
        transform: rotate(15deg) scale(1.1);
      }
      @keyframes floatPulse {
        0% { transform: translateY(0px); box-shadow: 0 8px 24px rgba(29,158,117,0.4); }
        50% { transform: translateY(-6px); box-shadow: 0 12px 36px rgba(29,158,117,0.6); }
        100% { transform: translateY(0px); box-shadow: 0 8px 24px rgba(29,158,117,0.4); }
      }
/* --- BULLETPROOF MOBILE RESPONSIVENESS --- */
      @media (max-width: 768px) {
        /* 1. Prevent horizontal scroll & scaling issues entirely */
        html, body { width: 100%; max-width: 100vw; overflow-x: hidden; margin: 0; padding: 0; }
        .container { width: 100%; padding: 0 1.2rem; box-sizing: border-box; overflow-x: hidden; }
        
        /* 2. Force ALL inline 300px/500px cards to collapse and fit the screen */
        div[style*="flex: 1 1 500px"], 
        div[style*="flex: 1 1 300px"],
        div[style*="minWidth: 300px"],
        div[style*="minWidth: 280px"],
        .terminal-wrap, 
        .tl-card {
          flex: 1 1 100% !important;
          min-width: 0 !important;
          max-width: 100% !important;
          width: 100% !important;
          box-sizing: border-box;
        }
        
        /* 3. Constrain images (like the Github charts) so they don't stretch */
        img { max-width: 100% !important; object-fit: contain; }

        /* 4. Nav adjusts to fit cleanly */
        nav { padding: 1rem; flex-wrap: wrap; justify-content: center; gap: 0.5rem; }
        .theme-btn { position: absolute; top: 1rem; right: 1rem; }
        .nav-logo { position: absolute; top: 1.2rem; left: 1rem; }
        .nav-links { margin-top: 2rem; width: 100%; justify-content: center; gap: 1rem; flex-wrap: wrap; }
        .nav-links a { font-size: 0.75rem; }
        .nav-links a span { display: none; } /* Hides numbers to save space */
        
        /* 5. Hero & Sections stack and center */
        #hero { padding-top: 7rem !important; }
        .hero-inner { flex-direction: column; text-align: center; gap: 2rem !important; }
        .hero-sub { margin-left: auto; margin-right: auto; }
        .hero-inner div[style*="display: flex"] { justify-content: center; flex-wrap: wrap; }
        section { padding: 4rem 0; }
        
        /* 6. Timeline adjustments for small screens */
        .timeline::before { left: 8px; }
        .tl-dot { width: 10px; height: 10px; margin-left: -5px; }
        .tl-item { gap: 1rem; flex-direction: column; }
        .tl-item > div:first-child { display: none; } 
        .timeline::before { display: none; } 
        
        /* 7. Chat Widget sizes perfectly to the phone */
        .chat-toggle { bottom: 1.2rem; right: 1.2rem; width: 56px; height: 56px; }
        #chat-bubble { width: calc(100vw - 2.4rem); right: 1.2rem; bottom: 5.5rem; }
      }
    </style>
  </head>
  <body>
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>
    <canvas id="particle-canvas"></canvas>
    
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
